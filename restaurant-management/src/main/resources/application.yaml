server:
  address: 0.0.0.0
  port: 8080
  servlet:
    context-path: /restaurant

spring:
  application:
    name: restaurant-management

  # 1. Configuração do PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:db_restaurant_management}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # 2. Configuração do Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    # A propriedade validate-on-migrate deve estar no mesmo nível de 'ignore-migration-patterns'
    validate-on-migrate: false
    ignore-migration-patterns:
      - 'ignored-migrations'

  # 3. Configuração Nova e Atualizada do MongoDB (Substitui as linhas 10 a 13 da imagem_d060fe.jpg)
  mongodb:
    uri: mongodb://localhost:${MONGO_PORT:27017}/${MONGO_DB_NAME:db_restaurant_audits}