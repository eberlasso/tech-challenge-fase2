
services:
  restaurant-app:
    build:
      context: ./restaurant-management
      dockerfile: Dockerfile
    container_name: restaurant_management_app
    env_file:
      - .env
    environment:
      DB_HOST: postgres-db
      MONGO_HOST: mongodb
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
      mongodb:
        condition: service_started
    restart: unless-stopped
    networks:
      - restaurant-network

  postgres-db:
    image: postgres:15.10  # Versão mais específica e estável
    container_name: postgres_db_restaurant
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pg_data_restaurant:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - restaurant-network

  mongodb:
    image: 'mongo:7.0'
    container_name: mongo_restaurant_audit
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data_restaurant:/data/db
    restart: unless-stopped
    networks:
      - restaurant-network

volumes:
  pg_data_restaurant:
    driver: local
  mongo_data_restaurant:
    driver: local

networks:
  restaurant-network:
    driver: bridge